<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metanoia Kleos - Interactive Journey Map</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        header {
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-button {
            background: white;
            border: none;
            border-radius: 15px;
            padding: 50px 40px;
            font-size: 1.3em;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            display: inline-block;
            color: #667eea;
            font-weight: bold;
        }

        .main-button:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        }

        .emoji {
            font-size: 4em;
            margin-bottom: 15px;
            display: block;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .main-button {
                padding: 40px 30px;
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍 Metanoia Kleos</h1>
            <p>Our Journey Through Impact (2022-2026)</p>
        </header>

        <a href="index.html" class="main-button">
            <span class="emoji">🗺️</span>
            Explore Interactive Journey Map
        </a>
    </div>
</body>
</html>
